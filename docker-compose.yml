version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/backend/dev.db
      - JWT_SECRET=monSecretTemporaire123!
    volumes:
      - sqlite-data:/app/backend
    restart: unless-stopped

volumes:
  sqlite-data: