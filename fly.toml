# fly.toml app configuration file generated for ecclesia-connect on 2026-07-05T01:42:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ecclesia-connect'
primary_region = 'cdg'

[build]

[env]
  NODE_ENV = 'production'

[[mounts]]
  source = 'sqlite_data'
  destination = '/app/backend'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
